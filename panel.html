<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-color: #1a1a1a;
      --panel-bg: #262626;
      --text-color: #ffffff;
      --accent-color: #00adb5;
      --output-border: #eee;
    }
    body { font-family: 'Courier New', monospace; padding: 12px; background: var(--bg-color); color: var(--text-color); margin: 0; }
    h3 { margin: 0 0 10px 0; color: var(--accent-color); font-size: 16px; }
    textarea { width: 100%; height: 160px; background: var(--panel-bg); color: #00ff66; border: 1px solid #444; font-family: monospace; font-size: 14px; padding: 8px; box-sizing: border-box; resize: vertical; outline: none; }
    button { margin-top: 10px; padding: 8px 18px; background: var(--accent-color); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: monospace; }
    button:hover { opacity: 0.9; }
    pre { margin-top: 15px; padding: 10px; background: var(--panel-bg); border-left: 3px solid var(--accent-color); white-space: pre-wrap; word-wrap: break-word; color: #f1f1f1; font-size: 13px; }
  </style>
</head>
<body>
  <h3>External-commands Console (No-Pyodide)</h3>
  <textarea id="code" placeholder="help 입력 또는 명령어를 직접 실행하세요.&#10;예: alert('hello') 또는 BGcolor('red')"></textarea>
  <button id="run-btn">Run Command</button>
  <pre id="output">준비 완료. 명령어를 입력하세요. (도움말: help)</pre>

  <script src="panel.js"></script>
</body>
</html>
