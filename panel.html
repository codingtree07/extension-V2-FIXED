<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: monospace; padding: 10px; background: #1e1e1e; color: #ffffff; }
    textarea { width: 100%; height: 200px; background: #2d2d2d; color: #a9dc76; border: 1px solid #444; font-family: monospace; font-size: 14px; padding: 5px; resize: vertical; }
    button { margin-top: 10px; padding: 8px 15px; background: #ff6188; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:disabled { background: #555; cursor: not-allowed; }
    pre { margin-top: 15px; padding: 10px; background: #2d2d2d; border-left: 3px solid #fc9867; white-space: pre-wrap; word-wrap: break-word; }
  </style>
  <!-- Pyodide 실시간 로드 -->
  <script src="https://jsdelivr.net"></script>
</head>
<body>
  <h3>PYCONSOLE.D</h3>
  <textarea id="code" placeholder="# 여기에 Python 코드를 입력하세요&#10;print('Hello from Python!')"></textarea>
  <button id="run-btn" disabled>로딩 중...</button>
  <pre id="output">Pyodide 런타임을 초기화하는 중입니다...</pre>

  <script src="panel.js"></script>
</body>
</html>
